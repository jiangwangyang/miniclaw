<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent 管理 - MiniClaw</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --charcoal: #36454f;
            --slate-gray: #708090;
            --light-gray: #e5e7eb;
            --crisp-white: #ffffff;
            --bg-primary: #f9fafb;
            --bg-secondary: #ffffff;
            --border-color: #e5e7eb;
            --accent-color: #36454f;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg-primary);
            color: var(--charcoal);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Top Navigation - Unified with skill.html */
        .navbar {
            height: 64px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            z-index: 100;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .back-link {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--slate-gray);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            padding: 8px 12px;
            border-radius: 8px;
            transition: var(--transition);
        }

        .back-link:hover {
            background: var(--bg-primary);
            color: var(--charcoal);
        }

        .nav-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .nav-actions {
            display: flex;
            gap: 12px;
        }

        /* Status Pill */
        .status-pill {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            background: var(--bg-primary);
            color: var(--slate-gray);
        }

        .status-success {
            color: #10b981;
        }

        .status-error {
            color: #ef4444;
        }

        /* Main Layout */
        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Editor Area */
        .editor-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-secondary);
            position: relative;
        }

        .textarea-wrapper {
            flex: 1;
            width: 100%;
            overflow-y: auto;
            display: flex;
            justify-content: center;
            background: var(--bg-primary);
            padding: 0;
        }

        textarea {
            width: 100%;
            max-width: 900px;
            height: 100%;
            min-height: 100%;
            padding: 3rem 4rem;
            border: none;
            border-left: 1px solid var(--border-color);
            border-right: 1px solid var(--border-color);
            resize: none;
            font-family: 'Fira Code', 'SF Mono', monospace;
            font-size: 15px;
            line-height: 1.7;
            color: var(--charcoal);
            outline: none;
            background: var(--bg-secondary);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.02);
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            border: 1px solid transparent;
        }

        .btn-primary {
            background: var(--charcoal);
            color: white;
        }

        .btn-primary:hover {
            background: #2d3a43;
            box-shadow: var(--shadow-md);
        }

        .btn-primary:disabled {
            background: var(--light-gray);
            cursor: not-allowed;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #e2e8f0;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #cbd5e1;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        .spin {
            animation: spin 1s linear infinite;
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="nav-left">
        <a href="/" class="back-link">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
            返回
        </a>
        <div class="nav-title">AGENTS.md</div>
    </div>
    <div class="nav-actions">
        <span id="status-msg" class="status-pill" style="display: none;"></span>
        <button id="save-btn" class="btn btn-primary">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
                <polyline points="17 21 17 13 7 13 7 21"></polyline>
                <polyline points="7 3 7 8 15 8"></polyline>
            </svg>
            保存修改
        </button>
    </div>
</nav>

<div class="main-container">
    <main class="editor-container">
        <div class="textarea-wrapper">
            <label for="agent-content"></label>
            <textarea id="agent-content" placeholder="在此输入 Agent 定义 (Markdown 格式)..." spellcheck="false"></textarea>
        </div>
    </main>
</div>

<script>
    const textarea = document.getElementById('agent-content');
    const saveBtn = document.getElementById('save-btn');
    const statusMsg = document.getElementById('status-msg');

    function showStatus(message, isError = false) {
        statusMsg.textContent = message;
        statusMsg.className = isError ? 'status-pill status-error' : 'status-pill status-success';
        statusMsg.style.display = 'block';
        if (!isError) {
            setTimeout(() => {
                statusMsg.style.display = 'none';
            }, 3000);
        }
    }

    async function fetchAgents() {
        try {
            const response = await fetch('/agents');
            const data = await response.json();
            textarea.value = data.content || '';
        } catch (error) {
            console.error('Failed to fetch agents:', error);
            showStatus('加载失败', true);
        }
    }

    async function saveAgents() {
        saveBtn.disabled = true;
        const originalContent = saveBtn.innerHTML;
        saveBtn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="spin"><circle cx="12" cy="12" r="10"></circle></svg> 保存中...`;
        try {
            const response = await fetch('/agents', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(textarea.value),
            });

            if (response.ok) {
                showStatus('已保存');
            } else {
                throw new Error('Save failed');
            }
        } catch (error) {
            console.error('Failed to save agents:', error);
            showStatus('保存失败', true);
        } finally {
            saveBtn.disabled = false;
            saveBtn.innerHTML = originalContent;
        }
    }

    saveBtn.addEventListener('click', saveAgents);

    // Shortcut: Cmd/Ctrl + S to save
    document.addEventListener('keydown', (e) => {
        if ((e.metaKey || e.ctrlKey) && e.key === 's') {
            e.preventDefault();
            saveAgents();
        }
    });

    // Initial fetch
    fetchAgents();
</script>
</body>
</html>
