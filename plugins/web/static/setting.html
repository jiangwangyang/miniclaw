<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设置管理 - MiniClaw</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --charcoal: #36454f;
            --slate-gray: #708090;
            --light-gray: #e5e7eb;
            --crisp-white: #ffffff;
            --bg-primary: #f9fafb;
            --bg-secondary: #ffffff;
            --border-color: #e5e7eb;
            --accent-color: #36454f;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg-primary);
            color: var(--charcoal);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Top Navigation - Unified with skill.html */
        .navbar {
            height: 64px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            z-index: 100;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .back-link {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--slate-gray);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            padding: 8px 12px;
            border-radius: 8px;
            transition: var(--transition);
        }

        .back-link:hover {
            background: var(--bg-primary);
            color: var(--charcoal);
        }

        .nav-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .nav-actions {
            display: flex;
            gap: 12px;
        }

        /* Status Pill */
        .status-pill {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            background: var(--bg-primary);
            color: var(--slate-gray);
        }

        .status-success {
            color: #10b981;
        }

        .status-error {
            color: #ef4444;
        }

        /* Main Content */
        .main-container {
            flex: 1;
            overflow-y: auto;
            padding: 32px;
        }

        .settings-card {
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 32px;
            border: 1px solid var(--border-color);
            max-width: 800px;
            margin: 0 auto;
        }

        .section-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 24px;
            color: var(--charcoal);
            letter-spacing: -0.5px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            color: var(--slate-gray);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .form-group .description {
            font-size: 13px;
            color: var(--slate-gray);
            margin-bottom: 12px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            font-family: 'Fira Code', monospace;
            font-size: 14px;
            transition: var(--transition);
            background: var(--bg-primary);
            color: var(--charcoal);
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--charcoal);
            box-shadow: 0 0 0 3px rgba(54, 69, 79, 0.1);
            background: var(--bg-secondary);
        }

        .form-group input::placeholder {
            color: var(--slate-gray);
            opacity: 0.6;
        }

        .advanced-toggle {
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid var(--border-color);
            text-align: center;
        }

        .advanced-toggle button {
            background: none;
            border: none;
            color: var(--slate-gray);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            padding: 8px 16px;
            border-radius: 8px;
        }

        .advanced-toggle button:hover {
            background: var(--bg-primary);
            color: var(--charcoal);
        }

        #advanced-editor {
            display: none;
            margin-top: 24px;
        }

        #advanced-editor textarea {
            width: 100%;
            height: 300px;
            padding: 16px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            font-family: 'Fira Code', monospace;
            font-size: 13px;
            resize: vertical;
            background: var(--bg-primary);
            color: var(--charcoal);
            outline: none;
            line-height: 1.6;
        }

        #advanced-editor textarea:focus {
            border-color: var(--charcoal);
            background: var(--bg-secondary);
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            border: 1px solid transparent;
        }

        .btn-primary {
            background: var(--charcoal);
            color: white;
        }

        .btn-primary:hover {
            background: #2d3a43;
            box-shadow: var(--shadow-md);
        }

        .btn-primary:disabled {
            background: var(--light-gray);
            cursor: not-allowed;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #e2e8f0;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #cbd5e1;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        .spin {
            animation: spin 1s linear infinite;
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="nav-left">
        <a href="/" class="back-link">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
            返回
        </a>
        <div class="nav-title">系统设置</div>
    </div>
    <div class="nav-actions">
        <span id="status-msg" class="status-pill" style="display: none;"></span>
        <button id="save-btn" class="btn btn-primary">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
                <polyline points="17 21 17 13 7 13 7 21"></polyline>
                <polyline points="7 3 7 8 15 8"></polyline>
            </svg>
            保存设置
        </button>
    </div>
</nav>

<div class="main-container">
    <div class="settings-card">
        <h2 class="section-title">API 配置</h2>

        <div class="form-group">
            <label for="base_url">Base URL</label>
            <p class="description">API 的基础请求地址，定义模型服务的访问入口。</p>
            <input type="text" id="base_url" placeholder="https://api.openai.com/v1" spellcheck="false">
        </div>

        <div class="form-group">
            <label for="api_key">API Key</label>
            <p class="description">用于身份验证的密钥，请妥善保管。</p>
            <input type="password" id="api_key" placeholder="在此输入您的 API 密钥" spellcheck="false">
        </div>

        <div class="form-group">
            <label for="model">模型名称</label>
            <p class="description">指定要使用的模型标识符（如 gpt-4o, claude-3-5-sonnet 等）。</p>
            <input type="text" id="model" placeholder="model-name" spellcheck="false">
        </div>

        <div class="advanced-toggle">
            <button id="toggle-advanced">显示高级 JSON 编辑器</button>
        </div>

        <div id="advanced-editor">
            <div class="form-group">
                <label for="settings-json">原始 JSON</label>
                <p class="description">高级配置项，直接编辑 settings.json 的内容。修改后需切换回此视图以确保同步。</p>
                <textarea id="settings-json" spellcheck="false"></textarea>
            </div>
        </div>
    </div>
</div>

<script>
    let originalSettings = {};
    const saveBtn = document.getElementById('save-btn');
    const statusMsg = document.getElementById('status-msg');
    const toggleAdvancedBtn = document.getElementById('toggle-advanced');
    const advancedEditor = document.getElementById('advanced-editor');
    const jsonTextarea = document.getElementById('settings-json');

    const fields = ['base_url', 'api_key', 'model'];

    function showStatus(message, isError = false) {
        statusMsg.textContent = message;
        statusMsg.className = isError ? 'status-pill status-error' : 'status-pill status-success';
        statusMsg.style.display = 'block';
        if (!isError) {
            setTimeout(() => {
                statusMsg.style.display = 'none';
            }, 3000);
        }
    }

    async function fetchSettings() {
        try {
            const response = await fetch('/setting');
            if (!response.ok) {
                if (response.status === 404) {
                    originalSettings = {};
                    return;
                }
                throw new Error('无法加载设置');
            }
            originalSettings = await response.json();

            // Populate basic fields
            fields.forEach(field => {
                const input = document.getElementById(field);
                if (input) {
                    input.value = originalSettings[field] || '';
                }
            });

            // Populate advanced editor
            jsonTextarea.value = JSON.stringify(originalSettings, null, 2);
        } catch (error) {
            console.error('Failed to fetch settings:', error);
            showStatus('加载设置失败', true);
        }
    }

    async function saveSettings() {
        let settingsToSave = {...originalSettings};

        // Always sync basic fields to the object
        fields.forEach(field => {
            const input = document.getElementById(field);
            if (input) {
                settingsToSave[field] = input.value.trim();
            }
        });

        // If user is in advanced mode, take the JSON directly
        if (advancedEditor.style.display === 'block') {
            try {
                settingsToSave = JSON.parse(jsonTextarea.value);
            } catch (e) {
                showStatus('JSON 格式不正确: ' + e.message, true);
                return;
            }
        }

        saveBtn.disabled = true;
        const originalBtnText = saveBtn.innerHTML;
        saveBtn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="spin"><circle cx="12" cy="12" r="10"></circle></svg> 保存中...`;

        try {
            const response = await fetch('/setting', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(JSON.stringify(settingsToSave)),
            });

            if (response.ok) {
                showStatus('设置已保存');
                originalSettings = settingsToSave;
                jsonTextarea.value = JSON.stringify(originalSettings, null, 2);

                // Update basic fields if they were changed in JSON mode
                fields.forEach(field => {
                    const input = document.getElementById(field);
                    if (input) {
                        input.value = originalSettings[field] || '';
                    }
                });
            } else {
                const errData = await response.json();
                throw new Error(errData.detail || '保存失败');
            }
        } catch (error) {
            console.error('Failed to save settings:', error);
            showStatus('保存失败: ' + error.message, true);
        } finally {
            saveBtn.disabled = false;
            saveBtn.innerHTML = originalBtnText;
        }
    }

    toggleAdvancedBtn.addEventListener('click', () => {
        if (advancedEditor.style.display === 'none' || advancedEditor.style.display === '') {
            advancedEditor.style.display = 'block';
            toggleAdvancedBtn.textContent = '隐藏高级 JSON 编辑器';
            // Sync form to JSON before showing
            const current = {...originalSettings};
            fields.forEach(field => {
                current[field] = document.getElementById(field).value.trim();
            });
            jsonTextarea.value = JSON.stringify(current, null, 2);
        } else {
            // Sync JSON back to form if valid
            try {
                const current = JSON.parse(jsonTextarea.value);
                fields.forEach(field => {
                    const input = document.getElementById(field);
                    if (input && current[field] !== undefined) {
                        input.value = current[field];
                    }
                });
            } catch (e) {
                // Ignore invalid JSON on hide
            }
            advancedEditor.style.display = 'none';
            toggleAdvancedBtn.textContent = '显示高级 JSON 编辑器';
        }
    });

    saveBtn.addEventListener('click', saveSettings);

    document.addEventListener('keydown', (e) => {
        if ((e.metaKey || e.ctrlKey) && e.key === 's') {
            e.preventDefault();
            saveSettings();
        }
    });

    fetchSettings();
</script>
</body>
</html>
