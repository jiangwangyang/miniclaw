<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiniClaw Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Modern Minimalist Theme */
            --charcoal: #36454f;
            --slate-gray: #708090;
            --light-gray: #d3d3d3;
            --crisp-white: #ffffff;
            --bg-primary: #f8f9fa;
            --bg-secondary: #ffffff;
            --border-color: #e5e7eb;
            --shadow-soft: 0 2px 8px rgba(54, 69, 79, 0.08);
            --shadow-elevated: 0 4px 20px rgba(54, 69, 79, 0.12);
            --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);

            /* Tool 消息专用颜色 - 低存在感 */
            --tool-bg: #f0f2f4;
            --tool-border: #e2e5e8;
            --tool-text: #8b95a0;

            /* 删除按钮颜色 */
            --danger-color: #ef4444;
            --danger-hover: #dc2626;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            height: 100vh;
            display: flex;
            overflow: hidden;
            color: var(--charcoal);
        }

        .sidebar {
            width: 280px;
            background: var(--bg-secondary);
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border-color);
            position: relative;
        }

        .sidebar::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 1px;
            height: 100%;
            background: linear-gradient(180deg, transparent, var(--slate-gray), transparent);
            opacity: 0.3;
        }

        .sidebar-header {
            padding: 24px 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: var(--charcoal);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
            font-weight: 700;
            font-family: 'Space Grotesk', sans-serif;
        }

        .logo-text {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 20px;
            font-weight: 700;
            color: var(--charcoal);
            letter-spacing: -0.5px;
        }

        .new-chat-btn {
            width: 100%;
            padding: 14px 20px;
            background: var(--charcoal);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition-smooth);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            letter-spacing: 0.3px;
        }

        .new-chat-btn:hover {
            background: #2d3a43;
            transform: translateY(-2px);
            box-shadow: var(--shadow-elevated);
        }

        .new-chat-btn:active {
            transform: translateY(0);
        }

        .sidebar-title {
            color: var(--slate-gray);
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            margin-top: 24px;
            margin-bottom: 12px;
            padding: 0 4px;
        }

        .session-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 12px 12px;
        }

        .session-list::-webkit-scrollbar {
            width: 4px;
        }

        .session-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .session-list::-webkit-scrollbar-thumb {
            background: var(--light-gray);
            border-radius: 4px;
        }

        .session-item {
            padding: 14px 16px;
            margin-bottom: 4px;
            background: transparent;
            border-radius: 10px;
            cursor: pointer;
            transition: var(--transition-smooth);
            color: var(--charcoal);
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid transparent;
            position: relative;
        }

        .session-item:hover {
            background: var(--bg-primary);
            border-color: var(--border-color);
        }

        .session-item:hover .delete-btn {
            opacity: 1;
        }

        .session-item.active {
            background: var(--charcoal);
            color: white;
            border-color: var(--charcoal);
        }

        .session-item.active:hover {
            background: #2d3a43;
        }

        .session-item.active .delete-btn {
            color: rgba(255, 255, 255, 0.7);
        }

        .session-item.active .delete-btn:hover {
            color: white;
            background: rgba(255, 255, 255, 0.15);
        }

        .session-item-icon {
            font-size: 16px;
            opacity: 0.8;
        }

        .session-item-text {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .session-item-time {
            font-size: 11px;
            opacity: 0.5;
            font-weight: 400;
        }

        .delete-btn {
            opacity: 0;
            padding: 6px;
            background: transparent;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            color: var(--slate-gray);
            transition: var(--transition-smooth);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .delete-btn:hover {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger-color);
        }

        .delete-btn svg {
            width: 14px;
            height: 14px;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            background: var(--bg-secondary);
            position: relative;
        }

        .header {
            background: var(--bg-secondary);
            padding: 18px 28px;
            color: var(--charcoal);
            font-size: 16px;
            font-weight: 600;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
        }

        .header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--light-gray), transparent);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-nav-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            color: var(--charcoal);
            text-decoration: none;
            cursor: pointer;
            transition: var(--transition-smooth);
        }

        .header-nav-btn:hover {
            background: var(--charcoal);
            color: white;
            border-color: var(--charcoal);
        }

        .header-nav-btn svg {
            width: 16px;
            height: 16px;
        }

        .header-session-info {
            font-size: 12px;
            color: var(--slate-gray);
            font-weight: 400;
            font-family: 'DM Sans', sans-serif;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px 28px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: var(--bg-secondary);
        }

        .chat-container::-webkit-scrollbar {
            width: 6px;
        }

        .chat-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-container::-webkit-scrollbar-thumb {
            background: var(--light-gray);
            border-radius: 3px;
        }

        .user-message {
            max-width: 72%;
            align-self: flex-end;
            padding: 16px 20px;
            border-radius: 20px;
            border-bottom-right-radius: 6px;
            background: linear-gradient(135deg, var(--charcoal) 0%, #2d3a43 100%);
            color: white;
            box-shadow: var(--shadow-elevated), 0 4px 12px rgba(54, 69, 79, 0.2);
            word-wrap: break-word;
            line-height: 1.6;
            font-size: 15px;
            font-weight: 500;
            animation: userMessageSlide 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }

        .user-message::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            border-radius: 20px 20px 0 0;
        }

        @keyframes userMessageSlide {
            from {
                opacity: 0;
                transform: translateY(16px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .assistant-message {
            max-width: 78%;
            align-self: flex-start;
            padding: 18px 22px;
            border-radius: 20px;
            border-bottom-left-radius: 6px;
            background: var(--bg-primary);
            color: var(--charcoal);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-soft);
            word-wrap: break-word;
            line-height: 1.7;
            font-size: 15px;
            animation: assistantMessageSlide 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .assistant-message pre {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 14px 18px;
            margin: 10px 0;
            overflow-x: auto;
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 13px;
            line-height: 1.5;
            box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.04);
        }

        .assistant-message code {
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 13px;
            background: rgba(54, 69, 79, 0.06);
            padding: 2px 6px;
            border-radius: 4px;
        }

        .assistant-message pre code {
            background: transparent;
            padding: 0;
        }

        @keyframes assistantMessageSlide {
            from {
                opacity: 0;
                transform: translateY(12px) scale(0.98);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .tool-message {
            max-width: 65%;
            align-self: flex-start;
            padding: 10px 14px;
            border-radius: 12px;
            border-bottom-left-radius: 4px;
            background: var(--tool-bg);
            color: var(--tool-text);
            border: 1px dashed var(--tool-border);
            word-wrap: break-word;
            line-height: 1.5;
            font-size: 12px;
            font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
            animation: toolMessageSlide 0.3s ease-out;
            opacity: 0.7;
            margin-left: 20px;
            position: relative;
        }

        .tool-message::before {
            content: '⚙️';
            font-size: 10px;
            margin-right: 6px;
            opacity: 0.6;
        }

        @keyframes toolMessageSlide {
            from {
                opacity: 0;
                transform: translateX(-8px);
            }
            to {
                opacity: 0.7;
                transform: translateX(0);
            }
        }

        .tool-message:hover {
            opacity: 0.85;
            border-color: #cdd2d6;
        }

        .message-time {
            font-size: 10px;
            opacity: 0.4;
            margin-top: 8px;
            font-weight: 500;
            color: inherit;
        }

        .message-wrapper {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--slate-gray);
            text-align: center;
            padding: 40px;
        }

        .empty-state-icon {
            width: 80px;
            height: 80px;
            background: var(--bg-primary);
            border: 2px solid var(--border-color);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            margin-bottom: 24px;
            transition: var(--transition-smooth);
            animation: emptyPulse 3s ease-in-out infinite;
        }

        @keyframes emptyPulse {
            0%, 100% {
                transform: scale(1);
                border-color: var(--border-color);
            }
            50% {
                transform: scale(1.05);
                border-color: var(--slate-gray);
            }
        }

        .empty-state-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 12px;
            color: var(--charcoal);
            letter-spacing: -0.5px;
        }

        .empty-state-text {
            font-size: 14px;
            max-width: 320px;
            line-height: 1.7;
            color: var(--slate-gray);
        }

        .empty-state-hint {
            margin-top: 24px;
            padding: 12px 20px;
            background: var(--bg-primary);
            border-radius: 10px;
            font-size: 13px;
            color: var(--slate-gray);
            border: 1px dashed var(--light-gray);
        }

        .input-wrapper {
            background: var(--bg-secondary);
            padding: 20px 28px 28px;
            border-top: 1px solid var(--border-color);
        }

        .input-container {
            background: var(--bg-primary);
            display: flex;
            gap: 12px;
            align-items: flex-end;
            padding: 6px;
            border-radius: 16px;
            border: 2px solid var(--border-color);
            transition: var(--transition-smooth);
        }

        .input-container:focus-within {
            border-color: var(--charcoal);
            box-shadow: 0 0 0 4px rgba(54, 69, 79, 0.08);
        }

        .message-input {
            flex: 1;
            padding: 12px 16px;
            border: none;
            background: transparent;
            font-size: 15px;
            font-family: 'DM Sans', sans-serif;
            color: var(--charcoal);
            outline: none;
            line-height: 1.5;
            resize: none;
            min-height: 44px;
            max-height: 160px;
            overflow-y: auto;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .message-input::placeholder {
            color: var(--slate-gray);
            opacity: 0.7;
        }

        .message-input:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .message-input::-webkit-scrollbar {
            width: 4px;
        }

        .message-input::-webkit-scrollbar-thumb {
            background: var(--light-gray);
            border-radius: 2px;
        }

        .btn {
            padding: 12px 22px;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            transition: var(--transition-smooth);
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }

        .send-button {
            background: var(--charcoal);
            color: white;
        }

        .send-button:hover:not(:disabled) {
            background: #2d3a43;
            transform: translateY(-1px);
            box-shadow: var(--shadow-soft);
        }

        .send-button:active:not(:disabled) {
            transform: translateY(0);
        }

        .send-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background: var(--slate-gray);
        }

        .interrupt-button {
            background: #dc2626;
            color: white;
        }

        .interrupt-button:hover {
            background: #b91c1c;
            transform: translateY(-1px);
            box-shadow: var(--shadow-soft);
        }

        .typing-indicator {
            display: none;
            align-self: flex-start;
            background: var(--bg-primary);
            padding: 14px 18px;
            border-radius: 16px;
            border-bottom-left-radius: 4px;
            margin: 0 28px;
            border: 1px solid var(--border-color);
        }

        .typing-indicator span {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: var(--slate-gray);
            border-radius: 50%;
            margin: 0 3px;
            animation: typingBounce 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.15s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.3s;
        }

        @keyframes typingBounce {
            0%, 60%, 100% {
                transform: translateY(0);
                opacity: 0.4;
            }
            30% {
                transform: translateY(-6px);
                opacity: 1;
            }
        }

        .confirm-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            animation: fadeIn 0.2s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .confirm-dialog {
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 24px;
            max-width: 360px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .confirm-icon {
            width: 48px;
            height: 48px;
            background: rgba(239, 68, 68, 0.1);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
            font-size: 24px;
        }

        .confirm-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 18px;
            font-weight: 700;
            color: var(--charcoal);
            margin-bottom: 8px;
        }

        .confirm-text {
            font-size: 14px;
            color: var(--slate-gray);
            line-height: 1.6;
            margin-bottom: 24px;
        }

        .confirm-buttons {
            display: flex;
            gap: 12px;
        }

        .confirm-btn {
            flex: 1;
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition-smooth);
            border: none;
        }

        .confirm-btn.cancel {
            background: var(--bg-primary);
            color: var(--charcoal);
            border: 1px solid var(--border-color);
        }

        .confirm-btn.cancel:hover {
            background: var(--border-color);
        }

        .confirm-btn.danger {
            background: var(--danger-color);
            color: white;
        }

        .confirm-btn.danger:hover {
            background: var(--danger-hover);
        }

        .workspace-btn {
            padding: 8px 12px;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 12px;
            color: var(--slate-gray);
            cursor: pointer;
            transition: var(--transition-smooth);
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 8px;
            width: fit-content;
        }

        .workspace-btn:hover {
            border-color: var(--charcoal);
            color: var(--charcoal);
        }

        .workspace-btn svg {
            width: 14px;
            height: 14px;
        }

        .workspace-path {
            max-width: 800px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-family: 'SF Mono', monospace;
        }

        .dir-modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 2000;
            backdrop-filter: blur(4px);
            animation: fadeIn 0.2s ease-out;
        }

        .dir-modal {
            background: var(--bg-secondary);
            width: 90%;
            max-width: 600px;
            height: 70vh;
            margin: 10vh auto;
            border-radius: 16px;
            box-shadow: var(--shadow-elevated);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .dir-modal-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .dir-modal-content {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        .dir-item {
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            color: var(--charcoal);
            transition: var(--transition-smooth);
        }

        .dir-item:hover {
            background: var(--bg-primary);
        }

        .dir-item-icon {
            font-size: 18px;
            color: var(--slate-gray);
        }

        .dir-modal-footer {
            padding: 16px 24px;
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            background: var(--bg-primary);
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 240px;
            }

            .user-message,
            .assistant-message {
                max-width: 85%;
            }

            .tool-message {
                max-width: 70%;
                margin-left: 10px;
            }
        }
    </style>
</head>
<body>
<!-- 侧边栏 -->
<div class="sidebar">
    <div class="sidebar-header">
        <div class="sidebar-logo">
            <div class="logo-icon">M</div>
            <span class="logo-text">MiniClaw</span>
        </div>
        <button class="new-chat-btn" onclick="startNewChat()">
            <span>+</span>
            <span>新对话</span>
        </button>
        <div class="sidebar-title">历史记录</div>
    </div>
    <div class="session-list" id="sessionList">
        <!-- 会话列表将在这里动态生成 -->
    </div>
</div>

<!-- 主内容区域 -->
<div class="main-content">
    <div class="header">
        <div class="header-left">
            <a class="header-nav-btn" href="/static/task.html">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="16" y1="2" x2="16" y2="6"></line>
                    <line x1="8" y1="2" x2="8" y2="6"></line>
                    <line x1="3" y1="10" x2="21" y2="10"></line>
                </svg>
                定时任务
            </a>
            <a class="header-nav-btn" href="/static/skill.html">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path>
                </svg>
                技能管理
            </a>
            <a class="header-nav-btn" href="/static/mcp.html">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="16 18 22 12 16 6"></polyline>
                    <polyline points="8 6 2 12 8 18"></polyline>
                </svg>
                MCP管理
            </a>
            <a class="header-nav-btn" href="/static/agents.html">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path>
                    <circle cx="9" cy="7" r="4"></circle>
                    <path d="M22 21v-2a4 4 0 0 0-3-3.87"></path>
                    <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                </svg>
                Agent管理
            </a>
            <a class="header-nav-btn" href="/static/settings.html">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                </svg>
                系统设置
            </a>
        </div>
        <span class="header-session-info" id="sessionInfo"></span>
    </div>

    <div class="chat-container" id="chatContainer">
        <div class="empty-state" id="emptyState">
            <div class="empty-state-icon">✨</div>
            <div class="empty-state-title">开始新对话</div>
            <div class="empty-state-text">点击左侧"新对话"按钮，或选择一个历史会话开始聊天</div>
            <div class="empty-state-hint">💡 输入消息后按 Enter 发送（Shift+Enter 换行），点击中断按钮可停止生成</div>
        </div>
    </div>

    <div class="typing-indicator" id="typingIndicator">
        <span></span><span></span><span></span>
    </div>

    <div class="input-wrapper">
        <button class="workspace-btn" id="workspaceBtn" onclick="selectWorkspace()" title="选择本地工作目录">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
            </svg>
            <span>工作区:</span>
            <span class="workspace-path" id="workspaceDisplay">未设置</span>
        </button>
        <div class="input-container">
            <label for="messageInput"></label>
            <textarea class="message-input" id="messageInput" placeholder="输入消息..." maxlength="2000" disabled rows="1"></textarea>
            <button class="interrupt-button btn" id="interruptButton" onclick="interruptSession()" style="display: none;">打断</button>
            <button class="send-button btn" id="sendButton" onclick="sendMessage()" disabled>发送</button>
        </div>
    </div>
</div>

<div id="dirModalOverlay" class="dir-modal-overlay">
    <div class="dir-modal">
        <div class="dir-modal-header">
            <h3 class="confirm-title" style="margin-bottom:0">选择工作区</h3>
            <span id="currentPathDisplay" style="font-size:12px; color:var(--slate-gray); font-family:monospace"></span>
            <button class="delete-btn" onclick="closeDirModal()" style="opacity:1">✕</button>
        </div>
        <div style="padding: 12px 24px; border-bottom: 1px solid var(--border-color); display: flex; gap: 8px; background: #fff;">
            <input type="text" id="manualPathInput" style="flex:1; padding: 8px 12px; border: 1px solid var(--border-color); border-radius: 8px; font-family: monospace; font-size: 13px; outline: none;" placeholder="手动输入或粘贴路径...">
            <button class="btn" style="padding: 8px 16px; font-size: 12px; background: var(--charcoal); color: white;" onclick="handleManualJump()">跳转</button>
        </div>
        <div id="dirList" class="dir-modal-content"></div>
        <div class="dir-modal-footer">
            <button class="confirm-btn cancel" onclick="closeDirModal()">取消</button>
            <button class="confirm-btn danger" style="background:var(--charcoal)" onclick="confirmDirSelection()">选择当前目录</button>
        </div>
    </div>
</div>
</body>

<script>
    const chatContainer = document.getElementById('chatContainer');
    const messageInput = document.getElementById('messageInput');
    const sendButton = document.getElementById('sendButton');
    const interruptButton = document.getElementById('interruptButton');
    const typingIndicator = document.getElementById('typingIndicator');
    const sessionList = document.getElementById('sessionList');
    const sessionInfo = document.getElementById('sessionInfo');
    const emptyState = document.getElementById('emptyState');
    const manualPathInput = document.getElementById('manualPathInput');

    let currentSessionId = null;
    let isTyping = false;
    let currentEventSource = null;
    let currentWorkdir = '';
    let tempSelectedPath = "";

    // 页面加载初始化
    document.addEventListener('DOMContentLoaded', () => {
        // 基础 UI 初始化
        initDefaultWorkspace();
        loadSessionList();

        // 事件绑定
        messageInput.addEventListener('input', autoResize);
        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        manualPathInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') handleManualJump();
        });

        // 会话恢复
        const savedSessionId = localStorage.getItem('miniclaw_current_session');
        savedSessionId ? loadSession(savedSessionId) : startNewChat();
    });

    // 远程加载目录列表
    async function loadDirList(path) {
        const dirListContainer = document.getElementById('dirList');
        const pathDisplay = document.getElementById('currentPathDisplay');

        dirListContainer.innerHTML = '<div style="padding:20px; text-align:center; color:var(--slate-gray)">加载中...</div>';

        try {
            const response = await fetch(`/dir/list?path=${encodeURIComponent(path)}`);
            const data = await response.json();

            tempSelectedPath = data.current_path;
            pathDisplay.textContent = data.current_path;
            dirListContainer.innerHTML = "";

            // 添加返回上级
            if (data.parent_path && data.parent_path !== data.current_path) {
                const upItem = createDirItem(".. (返回上一级)", data.parent_path, "⬆️");
                dirListContainer.appendChild(upItem);
            }

            // 渲染文件夹
            data.directories.forEach(dir => {
                const item = createDirItem(dir.name, dir.path, "📁");
                dirListContainer.appendChild(item);
            });
        } catch (error) {
            console.error('加载目录列表失败', error);
            dirListContainer.innerHTML = '<div style="padding:20px; color:var(--danger-color)">加载失败，请检查后端 API</div>';
        }
    }

    // 获取默认工作目录
    async function initDefaultWorkspace() {
        try {
            const response = await fetch(`/dir/list?path=`);
            const data = await response.json();
            if (data.current_path) {
                updateWorkspaceUI(data.current_path);
            }
        } catch (e) {
            console.error('获取默认路径失败');
        }
    }

    // 点击工作区按钮打开 Web 浏览器
    async function selectWorkspace() {
        document.getElementById('dirModalOverlay').style.display = 'block';
        loadDirList(currentWorkdir || "");
    }

    // 手动跳转逻辑
    function handleManualJump() {
        const targetPath = manualPathInput.value.trim();
        if (targetPath) {
            loadDirList(targetPath);
        }
    }

    function createDirItem(name, path, icon) {
        const div = document.createElement('div');
        div.className = 'dir-item';
        div.innerHTML = `<span class="dir-item-icon">${icon}</span><span>${name}</span>`;
        div.onclick = () => loadDirList(path);
        return div;
    }

    function confirmDirSelection() {
        updateWorkspaceUI(tempSelectedPath);
        closeDirModal();
    }

    function updateWorkspaceUI(path) {
        currentWorkdir = path;
        const display = document.getElementById('workspaceDisplay');
        display.textContent = path;
        display.title = path;
        localStorage.setItem('miniclaw_last_workdir', path); // 可选：持久化到本地
    }

    function closeDirModal() {
        document.getElementById('dirModalOverlay').style.display = 'none';
    }

    // 自动调整 textarea 高度
    function autoResize() {
        messageInput.style.height = 'auto';
        messageInput.style.height = Math.min(messageInput.scrollHeight, 160) + 'px';
    }

    // 加载会话列表
    async function loadSessionList() {
        try {
            const response = await fetch('/session/list');
            const sessions = await response.json();

            sessionList.innerHTML = '';
            sessions.forEach(session => {
                const item = document.createElement('div');
                item.className = 'session-item';
                item.dataset.id = session.id;
                item.innerHTML = `
                    <span class="session-item-icon">💬</span>
                    <span class="session-item-text">${escapeHtml(session.title)}</span>
                    <button class="delete-btn" onclick="event.stopPropagation(); confirmDeleteSession('${session.id}')" title="删除会话">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M3 6h18"></path>
                            <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path>
                            <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path>
                            <line x1="10" y1="11" x2="10" y2="17"></line>
                            <line x1="14" y1="11" x2="14" y2="17"></line>
                        </svg>
                    </button>
                `;
                item.onclick = () => loadSession(session.id);
                sessionList.appendChild(item);
            });
        } catch (error) {
            console.error('加载会话列表失败:', error);
        }
    }

    // 确认删除会话
    function confirmDeleteSession(sessionId) {
        const overlay = document.createElement('div');
        overlay.className = 'confirm-overlay';
        overlay.innerHTML = `
            <div class="confirm-dialog">
                <div class="confirm-icon">🗑️</div>
                <div class="confirm-title">删除会话</div>
                <div class="confirm-text">确定要删除这个会话吗？此操作无法撤销。</div>
                <div class="confirm-buttons">
                    <button class="confirm-btn cancel" onclick="closeConfirmDialog()">取消</button>
                    <button class="confirm-btn danger" onclick="deleteSession('${sessionId}')">删除</button>
                </div>
            </div>
        `;
        document.body.appendChild(overlay);

        // 点击遮罩层关闭
        overlay.addEventListener('click', (e) => {
            if (e.target === overlay) {
                closeConfirmDialog();
            }
        });
    }

    // 关闭确认对话框
    function closeConfirmDialog() {
        const overlay = document.querySelector('.confirm-overlay');
        if (overlay) {
            overlay.remove();
        }
    }

    // 删除会话
    async function deleteSession(sessionId) {
        closeConfirmDialog();

        try {
            const response = await fetch(`/session/${sessionId}`, {
                method: 'DELETE'
            });
            const result = await response.json();

            if (result.success) {
                // 如果删除的是当前会话，开始新对话
                if (currentSessionId === sessionId) {
                    startNewChat();
                }
                // 刷新会话列表
                loadSessionList();
            } else {
                console.error('删除失败:', result.message);
            }
        } catch (error) {
            console.error('删除会话失败:', error);
        }
    }

    // 开始新对话
    function startNewChat() {
        currentSessionId = crypto.randomUUID();
        localStorage.setItem('miniclaw_current_session', currentSessionId);

        // 清空聊天区域
        chatContainer.innerHTML = '';
        chatContainer.appendChild(emptyState);
        emptyState.style.display = 'flex';

        // 清空输入框并重置高度
        messageInput.value = '';
        autoResize();

        // 启用输入
        enableInput();
        sessionInfo.textContent = '新对话';

        // 刷新列表并高亮当前会话
        loadSessionList().then(() => {
            const items = sessionList.querySelectorAll('.session-item');
            items.forEach(item => item.classList.remove('active'));
        });
    }

    // 加载指定会话
    async function loadSession(sessionId) {
        currentSessionId = sessionId;
        localStorage.setItem('miniclaw_current_session', sessionId);

        try {
            const response = await fetch(`/session/${sessionId}`);
            const data = await response.json();

            // 清空聊天区域
            chatContainer.innerHTML = '';
            emptyState.style.display = 'none';

            // 渲染历史消息
            if (data.messages && data.messages.length > 0) {
                data.messages.forEach(msg => {
                    if (msg.role === 'user') {
                        addMessage(msg.content, 'user');
                    } else if (msg.role === 'assistant') {
                        if (msg.content) {
                            addMessage(msg.content, 'assistant');
                        }
                        if (msg.tool_calls) {
                            for (let i = 0; i < msg.tool_calls.length; i++) {
                                const tool_name = msg.tool_calls[i].function.name;
                                const arguments = msg.tool_calls[i].function.arguments;
                                addMessage(`${tool_name} ${arguments.slice(0, 100)}`, 'tool');
                            }
                        }
                    }
                });
            } else {
                chatContainer.appendChild(emptyState);
                emptyState.style.display = 'flex';
            }

            // 清空输入框并重置高度
            messageInput.value = '';
            autoResize();

            // 启用输入
            enableInput();
            sessionInfo.textContent = `${sessionId}`;

            // 更新高亮
            const items = sessionList.querySelectorAll('.session-item');
            items.forEach(item => {
                item.classList.toggle('active', item.dataset.id === sessionId);
            });
        } catch (error) {
            console.error('加载会话失败:', error);
            addMessage('加载会话失败: ' + error.message, 'assistant');
        }
    }

    // 启用输入
    function enableInput() {
        messageInput.disabled = false;
        sendButton.disabled = false;
        messageInput.focus();
    }

    function getCurrentTime() {
        const now = new Date();
        return now.toLocaleTimeString('zh-CN', {hour: '2-digit', minute: '2-digit'});
    }

    /**
     * 添加消息到聊天容器
     * @param {string} content - 消息内容
     * @param {string} type - 消息类型: 'user' | 'assistant' | 'tool'
     */
    function addMessage(content, type) {
        // 去除前后多余的空白字符
        content = content.trim();
        // 隐藏空状态
        emptyState.style.display = 'none';

        const messageDiv = document.createElement('div');
        messageDiv.className = `${type}-message`;

        // 根据类型格式化内容
        let formattedContent = escapeHtml(content);
        if (type === 'assistant') {
            formattedContent = formatMarkdown(content);
        }

        messageDiv.innerHTML = `
            ${formattedContent}
            <div class="message-time">${getCurrentTime()}</div>
        `;
        chatContainer.appendChild(messageDiv);
        scrollToBottom();
    }

    /**
     * 简单的 Markdown 格式化
     * @param {string} text - 原始文本
     * @returns {string} - 格式化后的 HTML
     */
    function formatMarkdown(text) {
        // 转义 HTML 特殊字符（但保留代码块内容）
        let result = escapeHtml(text);
        // 代码块
        result = result.replace(/```(\w*)\n?([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
        // 行内代码
        result = result.replace(/`([^`]+)`/g, '<code>$1</code>');
        // 粗体
        result = result.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
        // 斜体
        result = result.replace(/\*([^*]+)\*/g, '<em>$1</em>');
        // 换行
        result = result.replace(/\n/g, '<br>');
        return result;
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function scrollToBottom() {
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function setTyping(typing) {
        isTyping = typing;
        typingIndicator.style.display = typing ? 'block' : 'none';
        sendButton.disabled = typing;
        messageInput.disabled = typing;
        interruptButton.style.display = typing ? 'flex' : 'none';
    }

    async function interruptSession() {
        if (!currentSessionId) return;
        try {
            const response = await fetch(`/interrupt/${currentSessionId}`);
            const result = await response.json();
        } catch (error) {
            console.error('打断失败:', error);
        }
    }

    async function sendMessage() {
        const message = messageInput.value.trim();
        if (!message || isTyping || !currentSessionId) return;

        // 添加用户消息
        addMessage(message, 'user');
        messageInput.value = '';
        autoResize();

        // 显示输入中
        setTyping(true);

        try {
            currentEventSource = new EventSource(`/chat/${currentSessionId}?message=${encodeURIComponent(message)}&workdir=${encodeURIComponent(currentWorkdir)}`);
            let assistantMessage = '';
            let messageDiv = null;

            currentEventSource.onmessage = (event) => {
                const line = event.data;

                // 检查结束标记
                if (line === '[DONE]') {
                    currentEventSource.close();
                    currentEventSource = null;
                    setTyping(false);
                    // 刷新会话列表
                    loadSessionList();
                    return;
                }

                try {
                    const data = JSON.parse(line);
                    if (data && data.role === 'assistant' && data.content) {
                        if (!messageDiv) {
                            messageDiv = document.createElement('div');
                            messageDiv.className = 'assistant-message';
                            chatContainer.appendChild(messageDiv);
                        }
                        assistantMessage += data.content;
                        messageDiv.innerHTML = `
                            ${formatMarkdown(assistantMessage)}
                            <div class="message-time">${getCurrentTime()}</div>
                        `;
                        scrollToBottom();
                    }
                    if (data && data.role === 'assistant' && data.tool_calls) {
                        for (let i = 0; i < data.tool_calls.length; i++) {
                            const tool_name = data.tool_calls[i].function.name;
                            const arguments = data.tool_calls[i].function.arguments;
                            addMessage(`${tool_name} ${arguments.slice(0, 100)}`, 'tool');
                        }
                        assistantMessage = '';
                        messageDiv = null;
                    }
                } catch (e) {
                    // 忽略非 JSON 行
                }
            };

            currentEventSource.onerror = (error) => {
                currentEventSource.close();
                currentEventSource = null;
                setTyping(false);
                if (!assistantMessage) {
                    addMessage('抱歉，我没有收到响应。', 'assistant');
                }
            };
        } catch (error) {
            setTyping(false);
            addMessage('抱歉，发生了错误：' + error.message, 'assistant');
        }
    }
</script>
</html>
