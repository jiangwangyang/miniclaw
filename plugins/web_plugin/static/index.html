<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiniClaw Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Modern Minimalist Theme */
            --charcoal: #36454f;
            --slate-gray: #708090;
            --light-gray: #d3d3d3;
            --crisp-white: #ffffff;
            --bg-primary: #f8f9fa;
            --bg-secondary: #ffffff;
            --border-color: #e5e7eb;
            --shadow-soft: 0 2px 8px rgba(54, 69, 79, 0.08);
            --shadow-elevated: 0 4px 20px rgba(54, 69, 79, 0.12);
            --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            height: 100vh;
            display: flex;
            overflow: hidden;
            color: var(--charcoal);
        }

        /* 侧边栏 */
        .sidebar {
            width: 280px;
            background: var(--bg-secondary);
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border-color);
            position: relative;
        }

        .sidebar::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 1px;
            height: 100%;
            background: linear-gradient(180deg, transparent, var(--slate-gray), transparent);
            opacity: 0.3;
        }

        .sidebar-header {
            padding: 24px 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: var(--charcoal);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
            font-weight: 700;
            font-family: 'Space Grotesk', sans-serif;
        }

        .logo-text {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 20px;
            font-weight: 700;
            color: var(--charcoal);
            letter-spacing: -0.5px;
        }

        .new-chat-btn {
            width: 100%;
            padding: 14px 20px;
            background: var(--charcoal);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition-smooth);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            letter-spacing: 0.3px;
        }

        .new-chat-btn:hover {
            background: #2d3a43;
            transform: translateY(-2px);
            box-shadow: var(--shadow-elevated);
        }

        .new-chat-btn:active {
            transform: translateY(0);
        }

        .sidebar-title {
            color: var(--slate-gray);
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            margin-top: 24px;
            margin-bottom: 12px;
            padding: 0 4px;
        }

        .session-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 12px 12px;
        }

        .session-list::-webkit-scrollbar {
            width: 4px;
        }

        .session-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .session-list::-webkit-scrollbar-thumb {
            background: var(--light-gray);
            border-radius: 4px;
        }

        .session-item {
            padding: 14px 16px;
            margin-bottom: 4px;
            background: transparent;
            border-radius: 10px;
            cursor: pointer;
            transition: var(--transition-smooth);
            color: var(--charcoal);
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid transparent;
        }

        .session-item:hover {
            background: var(--bg-primary);
            border-color: var(--border-color);
        }

        .session-item.active {
            background: var(--charcoal);
            color: white;
            border-color: var(--charcoal);
        }

        .session-item-icon {
            font-size: 16px;
            opacity: 0.8;
        }

        .session-item-text {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .session-item-time {
            font-size: 11px;
            opacity: 0.5;
            font-weight: 400;
        }

        /* 主内容区域 */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            background: var(--bg-secondary);
            position: relative;
        }

        .header {
            background: var(--bg-secondary);
            padding: 18px 28px;
            color: var(--charcoal);
            font-size: 16px;
            font-weight: 600;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
        }

        .header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--light-gray), transparent);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--charcoal) 0%, var(--slate-gray) 100%);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 14px;
        }

        .header-title {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        .header-session-info {
            font-size: 12px;
            color: var(--slate-gray);
            font-weight: 400;
            font-family: 'DM Sans', sans-serif;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px 28px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: var(--bg-secondary);
        }

        .chat-container::-webkit-scrollbar {
            width: 6px;
        }

        .chat-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-container::-webkit-scrollbar-thumb {
            background: var(--light-gray);
            border-radius: 3px;
        }

        /* 消息样式 */
        .message {
            max-width: 72%;
            padding: 16px 20px;
            border-radius: 16px;
            word-wrap: break-word;
            line-height: 1.6;
            font-size: 15px;
            animation: messageSlide 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes messageSlide {
            from {
                opacity: 0;
                transform: translateY(12px) scale(0.98);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .user-message {
            align-self: flex-end;
            background: var(--charcoal);
            color: white;
            border-bottom-right-radius: 4px;
            box-shadow: var(--shadow-elevated);
        }

        .assistant-message {
            align-self: flex-start;
            background: var(--bg-primary);
            color: var(--charcoal);
            border-bottom-left-radius: 4px;
            border: 1px solid var(--border-color);
        }

        .message-time {
            font-size: 11px;
            opacity: 0.5;
            margin-top: 8px;
            font-weight: 500;
        }

        /* 空状态 */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--slate-gray);
            text-align: center;
            padding: 40px;
        }

        .empty-state-icon {
            width: 80px;
            height: 80px;
            background: var(--bg-primary);
            border: 2px solid var(--border-color);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            margin-bottom: 24px;
            transition: var(--transition-smooth);
            animation: emptyPulse 3s ease-in-out infinite;
        }

        @keyframes emptyPulse {
            0%, 100% { transform: scale(1); border-color: var(--border-color); }
            50% { transform: scale(1.05); border-color: var(--slate-gray); }
        }

        .empty-state-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 12px;
            color: var(--charcoal);
            letter-spacing: -0.5px;
        }

        .empty-state-text {
            font-size: 14px;
            max-width: 320px;
            line-height: 1.7;
            color: var(--slate-gray);
        }

        .empty-state-hint {
            margin-top: 24px;
            padding: 12px 20px;
            background: var(--bg-primary);
            border-radius: 10px;
            font-size: 13px;
            color: var(--slate-gray);
            border: 1px dashed var(--light-gray);
        }

        /* 输入区域 */
        .input-wrapper {
            background: var(--bg-secondary);
            padding: 20px 28px 28px;
            border-top: 1px solid var(--border-color);
        }

        .input-container {
            background: var(--bg-primary);
            display: flex;
            gap: 12px;
            align-items: flex-end;
            padding: 6px;
            border-radius: 16px;
            border: 2px solid var(--border-color);
            transition: var(--transition-smooth);
        }

        .input-container:focus-within {
            border-color: var(--charcoal);
            box-shadow: 0 0 0 4px rgba(54, 69, 79, 0.08);
        }

        .message-input {
            flex: 1;
            padding: 12px 16px;
            border: none;
            background: transparent;
            font-size: 15px;
            font-family: 'DM Sans', sans-serif;
            color: var(--charcoal);
            outline: none;
            line-height: 1.5;
            resize: none;
            min-height: 44px;
            max-height: 160px;
            overflow-y: auto;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .message-input::placeholder {
            color: var(--slate-gray);
            opacity: 0.7;
        }

        .message-input:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* 自动调整 textarea 高度 */
        .message-input::-webkit-scrollbar {
            width: 4px;
        }

        .message-input::-webkit-scrollbar-thumb {
            background: var(--light-gray);
            border-radius: 2px;
        }

        .btn {
            padding: 12px 22px;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            transition: var(--transition-smooth);
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }

        .send-button {
            background: var(--charcoal);
            color: white;
        }

        .send-button:hover:not(:disabled) {
            background: #2d3a43;
            transform: translateY(-1px);
            box-shadow: var(--shadow-soft);
        }

        .send-button:active:not(:disabled) {
            transform: translateY(0);
        }

        .send-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background: var(--slate-gray);
        }

        .interrupt-button {
            background: #dc2626;
            color: white;
        }

        .interrupt-button:hover {
            background: #b91c1c;
            transform: translateY(-1px);
            box-shadow: var(--shadow-soft);
        }

        /* 输入中指示器 */
        .typing-indicator {
            display: none;
            align-self: flex-start;
            background: var(--bg-primary);
            padding: 14px 18px;
            border-radius: 16px;
            border-bottom-left-radius: 4px;
            margin: 0 28px;
            border: 1px solid var(--border-color);
        }

        .typing-indicator span {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: var(--slate-gray);
            border-radius: 50%;
            margin: 0 3px;
            animation: typingBounce 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.15s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.3s; }

        @keyframes typingBounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-6px); opacity: 1; }
        }

        /* 快捷提示 */
        .quick-hints {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .quick-hint {
            padding: 8px 14px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 12px;
            color: var(--slate-gray);
            cursor: pointer;
            transition: var(--transition-smooth);
        }

        .quick-hint:hover {
            border-color: var(--charcoal);
            color: var(--charcoal);
            background: var(--bg-primary);
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .sidebar {
                width: 240px;
            }
            .message {
                max-width: 85%;
            }
        }
    </style>
</head>
<body>
<!-- 侧边栏 -->
<div class="sidebar">
    <div class="sidebar-header">
        <div class="sidebar-logo">
            <div class="logo-icon">M</div>
            <span class="logo-text">MiniClaw</span>
        </div>
        <button class="new-chat-btn" onclick="startNewChat()">
            <span>+</span>
            <span>新对话</span>
        </button>
        <div class="sidebar-title">历史记录</div>
    </div>
    <div class="session-list" id="sessionList">
        <!-- 会话列表将在这里动态生成 -->
    </div>
</div>

<!-- 主内容区域 -->
<div class="main-content">
    <div class="header">
        <div class="header-left">
            <div class="header-icon">💬</div>
            <span class="header-title">MiniClaw Chat</span>
        </div>
        <span class="header-session-info" id="sessionInfo"></span>
    </div>

    <div class="chat-container" id="chatContainer">
        <div class="empty-state" id="emptyState">
            <div class="empty-state-icon">✨</div>
            <div class="empty-state-title">开始新对话</div>
            <div class="empty-state-text">点击左侧"新对话"按钮，或选择一个历史会话开始聊天</div>
            <div class="empty-state-hint">
                💡 输入消息后按 Enter 发送（Shift+Enter 换行），点击中断按钮可停止生成
            </div>
        </div>
    </div>

    <div class="typing-indicator" id="typingIndicator">
        <span></span><span></span><span></span>
    </div>

    <div class="input-wrapper">
        <div class="input-container">
            <label for="messageInput"></label>
            <textarea class="message-input" id="messageInput" placeholder="输入消息..." maxlength="2000" disabled rows="1"></textarea>
            <button class="interrupt-button btn" id="interruptButton" onclick="interruptSession()" style="display: none;">打断</button>
            <button class="send-button btn" id="sendButton" onclick="sendMessage()" disabled>发送</button>
        </div>
    </div>
</div>

<script>
    const chatContainer = document.getElementById('chatContainer');
    const messageInput = document.getElementById('messageInput');
    const sendButton = document.getElementById('sendButton');
    const interruptButton = document.getElementById('interruptButton');
    const typingIndicator = document.getElementById('typingIndicator');
    const sessionList = document.getElementById('sessionList');
    const sessionInfo = document.getElementById('sessionInfo');
    const emptyState = document.getElementById('emptyState');

    let currentSessionId = null;
    let isTyping = false;
    let currentEventSource = null;

    // 自动调整 textarea 高度
    function autoResize() {
        messageInput.style.height = 'auto';
        messageInput.style.height = Math.min(messageInput.scrollHeight, 160) + 'px';
    }

    // 页面加载时初始化
    document.addEventListener('DOMContentLoaded', () => {
        loadSessionList();

        // 监听输入事件，自动调整高度
        messageInput.addEventListener('input', autoResize);

        // 回车发送，Shift+Enter 换行
        messageInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // 自动初始化会话：尝试恢复上次会话，否则创建新会话
        const savedSessionId = localStorage.getItem('miniclaw_current_session');
        if (savedSessionId) {
            loadSession(savedSessionId);
        } else {
            startNewChat();
        }
    });

    // 加载会话列表
    async function loadSessionList() {
        try {
            const response = await fetch('/session/list');
            const sessions = await response.json();

            sessionList.innerHTML = '';
            sessions.forEach(session => {
                const item = document.createElement('div');
                item.className = 'session-item';
                item.dataset.id = session.id;
                item.innerHTML = `
                    <span class="session-item-icon">💬</span>
                    <span class="session-item-text">${escapeHtml(session.title)}</span>
                `;
                item.onclick = () => loadSession(session.id);
                sessionList.appendChild(item);
            });
        } catch (error) {
            console.error('加载会话列表失败:', error);
        }
    }

    // 开始新对话
    function startNewChat() {
        currentSessionId = crypto.randomUUID();
        localStorage.setItem('miniclaw_current_session', currentSessionId);

        // 清空聊天区域
        chatContainer.innerHTML = '';
        chatContainer.appendChild(emptyState);
        emptyState.style.display = 'flex';

        // 清空输入框并重置高度
        messageInput.value = '';
        autoResize();

        // 启用输入
        enableInput();
        sessionInfo.textContent = '新对话';

        // 刷新列表并高亮当前会话
        loadSessionList().then(() => {
            const items = sessionList.querySelectorAll('.session-item');
            items.forEach(item => item.classList.remove('active'));
        });
    }

    // 加载指定会话
    async function loadSession(sessionId) {
        currentSessionId = sessionId;
        localStorage.setItem('miniclaw_current_session', sessionId);

        try {
            const response = await fetch(`/session/${sessionId}`);
            const data = await response.json();

            // 清空聊天区域
            chatContainer.innerHTML = '';
            emptyState.style.display = 'none';

            // 渲染历史消息
            if (data.messages && data.messages.length > 0) {
                data.messages.forEach(msg => {
                    if (msg.role === 'user') {
                        addMessage(msg.content, true);
                    } else if (msg.role === 'assistant') {
                        addMessage(msg.content, false);
                    } else if (msg.role === 'tool') {
                        addMessage(msg.content, false);
                    }
                });
            } else {
                chatContainer.appendChild(emptyState);
                emptyState.style.display = 'flex';
            }

            // 清空输入框并重置高度
            messageInput.value = '';
            autoResize();

            // 启用输入
            enableInput();
            sessionInfo.textContent = `会话: ${sessionId.slice(0, 8)}...`;

            // 更新高亮
            const items = sessionList.querySelectorAll('.session-item');
            items.forEach(item => {
                item.classList.toggle('active', item.dataset.id === sessionId);
            });
        } catch (error) {
            console.error('加载会话失败:', error);
            addMessage('加载会话失败: ' + error.message, false);
        }
    }

    // 启用输入
    function enableInput() {
        messageInput.disabled = false;
        sendButton.disabled = false;
        messageInput.focus();
    }

    function getCurrentTime() {
        const now = new Date();
        return now.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
    }

    function addMessage(content, isUser) {
        // 隐藏空状态
        emptyState.style.display = 'none';

        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${isUser ? 'user-message' : 'assistant-message'}`;
        messageDiv.innerHTML = `
            ${escapeHtml(content)}
            <div class="message-time">${getCurrentTime()}</div>
        `;
        chatContainer.appendChild(messageDiv);
        scrollToBottom();
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function scrollToBottom() {
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function setTyping(typing) {
        isTyping = typing;
        typingIndicator.style.display = typing ? 'block' : 'none';
        sendButton.disabled = typing;
        messageInput.disabled = typing;
        interruptButton.style.display = typing ? 'flex' : 'none';
    }

    async function interruptSession() {
        if (!currentSessionId) return;
        try {
            const response = await fetch(`/interrupt?id=${currentSessionId}`);
            const result = await response.json();
        } catch (error) {
            console.error('打断失败:', error);
        }
    }

    async function sendMessage() {
        const message = messageInput.value.trim();
        if (!message || isTyping || !currentSessionId) return;

        // 添加用户消息
        addMessage(message, true);
        messageInput.value = '';
        autoResize();

        // 显示输入中
        setTyping(true);

        try {
            currentEventSource = new EventSource(`/chat?message=${encodeURIComponent(message)}&id=${currentSessionId}`);
            let assistantMessage = '';
            let messageDiv = null;

            currentEventSource.onmessage = (event) => {
                const line = event.data;

                // 检查结束标记
                if (line === '[DONE]') {
                    currentEventSource.close();
                    currentEventSource = null;
                    setTyping(false);
                    // 刷新会话列表
                    loadSessionList();
                    return;
                }

                try {
                    const data = JSON.parse(line);
                    if (data && data.role === 'tool') {
                        assistantMessage = '';
                        messageDiv = null;
                    }
                    if (data && data.content) {
                        if (!messageDiv) {
                            messageDiv = document.createElement('div');
                            messageDiv.className = 'message assistant-message';
                            chatContainer.appendChild(messageDiv);
                        }
                        assistantMessage += data.content;
                        messageDiv.innerHTML = `
                            ${escapeHtml(assistantMessage)}
                            <div class="message-time">${getCurrentTime()}</div>
                        `;
                        scrollToBottom();
                    }
                    if (data && data.role === 'tool') {
                        assistantMessage = '';
                        messageDiv = null;
                    }
                } catch (e) {
                    // 忽略非 JSON 行
                }
            };

            currentEventSource.onerror = (error) => {
                currentEventSource.close();
                currentEventSource = null;
                setTyping(false);
                if (!assistantMessage) {
                    addMessage('抱歉，我没有收到响应。', false);
                }
            };
        } catch (error) {
            setTyping(false);
            addMessage('抱歉，发生了错误：' + error.message, false);
        }
    }
</script>
</body>
</html>
