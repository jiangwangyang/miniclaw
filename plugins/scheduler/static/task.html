<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>定时任务管理</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-primary: #1a1a2e;
            --color-secondary: #16213e;
            --color-accent: #0f3460;
            --color-highlight: #e94560;
            --color-text: #1a1a2e;
            --color-text-light: #6b7280;
            --color-bg: #fafbfc;
            --color-card: #ffffff;
            --color-border: #e5e7eb;
            --color-success: #10b981;
            --color-warning: #f59e0b;
            --color-error: #ef4444;

            --font-display: 'DM Sans', -apple-system, sans-serif;
            --font-mono: 'DM Mono', 'SF Mono', monospace;

            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 12px 40px rgba(0, 0, 0, 0.08);

            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-display);
            background: var(--color-bg);
            color: var(--color-text);
            line-height: 1.6;
            min-height: 100vh;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(circle at 25% 25%, rgba(233, 69, 96, 0.03) 0%, transparent 50%),
            radial-gradient(circle at 75% 75%, rgba(15, 52, 96, 0.03) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 24px;
        }

        .header {
            margin-bottom: 48px;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 0.6s ease forwards;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: var(--color-primary);
        }

        .header-accent {
            width: 48px;
            height: 4px;
            background: linear-gradient(90deg, var(--color-highlight), var(--color-accent));
            border-radius: 2px;
        }

        .header-subtitle {
            color: var(--color-text-light);
            font-size: 1rem;
            margin-top: 12px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 40px;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 0.6s ease 0.1s forwards;
        }

        .stat-card {
            background: var(--color-card);
            border-radius: var(--radius-md);
            padding: 24px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--color-border);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .stat-card:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }

        .stat-label {
            font-size: 0.75rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--color-text-light);
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            font-family: var(--font-mono);
            color: var(--color-primary);
        }

        .stat-card.highlight .stat-value {
            color: var(--color-highlight);
        }

        .action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 0.6s ease 0.2s forwards;
        }

        .action-bar h2 {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 20px;
            font-family: var(--font-display);
            font-size: 0.875rem;
            font-weight: 500;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background: var(--color-primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--color-secondary);
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }

        .btn-secondary {
            background: var(--color-card);
            color: var(--color-text);
            border: 1px solid var(--color-border);
        }

        .btn-secondary:hover {
            background: var(--color-bg);
            border-color: var(--color-text-light);
        }

        .btn-icon {
            padding: 8px;
            border-radius: var(--radius-sm);
            background: transparent;
            color: var(--color-text-light);
            transition: all 0.2s ease;
        }

        .btn-icon:hover {
            background: var(--color-bg);
            color: var(--color-text);
        }

        .btn-success {
            background: var(--color-success);
            color: white;
        }

        .btn-success:hover {
            filter: brightness(1.1);
        }

        .btn-warning {
            background: var(--color-warning);
            color: white;
        }

        .btn-warning:hover {
            filter: brightness(1.1);
        }

        .btn-danger {
            background: var(--color-error);
            color: white;
        }

        .btn-danger:hover {
            filter: brightness(1.1);
        }

        .task-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .task-card {
            background: var(--color-card);
            border-radius: var(--radius-lg);
            padding: 24px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--color-border);
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .task-card.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .task-card:hover {
            box-shadow: var(--shadow-md);
        }

        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }

        .task-info h3 {
            font-size: 1.125rem;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .task-meta {
            display: flex;
            gap: 16px;
            font-size: 0.8125rem;
            color: var(--color-text-light);
        }

        .task-meta span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .task-status {
            display: inline-flex;
            align-items: center;
            padding: 4px 12px;
            font-size: 0.75rem;
            font-weight: 500;
            border-radius: 100px;
        }

        .task-status.enabled {
            background: rgba(16, 185, 129, 0.1);
            color: var(--color-success);
        }

        .task-status.disabled {
            background: rgba(107, 114, 128, 0.1);
            color: var(--color-text-light);
        }

        .task-cron {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: var(--color-bg);
            border-radius: var(--radius-sm);
            font-family: var(--font-mono);
            font-size: 0.8125rem;
            color: var(--color-accent);
            margin-bottom: 16px;
        }

        .task-content {
            padding: 16px;
            background: var(--color-bg);
            border-radius: var(--radius-sm);
            font-size: 0.875rem;
            line-height: 1.7;
            color: var(--color-text);
            white-space: pre-wrap;
            margin-bottom: 16px;
            border-left: 3px solid var(--color-border);
        }

        .task-actions {
            display: flex;
            gap: 8px;
            padding-top: 16px;
            border-top: 1px solid var(--color-border);
        }

        .task-actions .btn {
            padding: 8px 16px;
            font-size: 0.8125rem;
        }

        .empty-state {
            text-align: center;
            padding: 80px 24px;
            background: var(--color-card);
            border-radius: var(--radius-lg);
            border: 1px dashed var(--color-border);
            opacity: 0;
            animation: fadeUp 0.6s ease forwards;
        }

        .empty-state-icon {
            width: 64px;
            height: 64px;
            margin: 0 auto 24px;
            background: var(--color-bg);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .empty-state-icon svg {
            width: 32px;
            height: 32px;
            color: var(--color-text-light);
        }

        .empty-state h3 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .empty-state p {
            color: var(--color-text-light);
            margin-bottom: 24px;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(26, 26, 46, 0.6);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background: var(--color-card);
            border-radius: var(--radius-lg);
            width: 100%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: var(--shadow-lg);
            transform: scale(0.95) translateY(20px);
            transition: transform 0.3s ease;
        }

        .modal-overlay.active .modal {
            transform: scale(1) translateY(0);
        }

        .modal-header {
            padding: 24px;
            border-bottom: 1px solid var(--color-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .modal-body {
            padding: 24px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            font-family: var(--font-display);
            font-size: 0.9375rem;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-sm);
            background: var(--color-bg);
            transition: all 0.2s ease;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--color-accent);
            box-shadow: 0 0 0 3px rgba(15, 52, 96, 0.1);
        }

        .form-group textarea {
            min-height: 120px;
            resize: vertical;
            font-family: var(--font-mono);
        }

        /* Cron fields - 8 columns: year, month, day, week, day_of_week, hour, minute, second */
        .form-row {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 6px;
        }

        .form-row .form-group {
            margin-bottom: 0;
        }

        .form-row label {
            font-size: 0.7rem;
            text-align: center;
            color: var(--color-text-light);
        }

        .form-row input {
            text-align: center;
            padding: 8px 2px;
            font-family: var(--font-mono);
            font-size: 0.8rem;
        }

        .cron-helper {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-top: 12px;
        }

        .cron-preset {
            padding: 8px 12px;
            font-size: 0.75rem;
            text-align: center;
            background: var(--color-bg);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .cron-preset:hover {
            border-color: var(--color-accent);
            color: var(--color-accent);
        }

        .modal-footer {
            padding: 16px 24px;
            border-top: 1px solid var(--color-border);
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }

        .toast-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 1100;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .toast {
            padding: 16px 24px;
            background: var(--color-primary);
            color: white;
            border-radius: var(--radius-sm);
            box-shadow: var(--shadow-lg);
            font-size: 0.875rem;
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideIn 0.3s ease, fadeOut 0.3s ease 2.7s forwards;
        }

        .toast.success {
            background: var(--color-success);
        }

        .toast.error {
            background: var(--color-error);
        }

        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(100px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes fadeOut {
            to {
                opacity: 0;
                transform: translateX(100px);
            }
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px 24px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--color-border);
            border-top-color: var(--color-accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @media (max-width: 768px) {
            .container {
                padding: 24px 16px;
            }

            .header h1 {
                font-size: 1.5rem;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .form-row {
                grid-template-columns: repeat(4, 1fr);
            }

            .task-header {
                flex-direction: column;
                gap: 12px;
            }

            .task-actions {
                flex-wrap: wrap;
            }

            .action-bar {
                flex-direction: column;
                gap: 16px;
                align-items: stretch;
            }
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--color-bg);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--color-border);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--color-text-light);
        }
    </style>
</head>
<body>
<div class="container">
    <header class="header">
        <div class="header-top">
            <h1>定时任务管理</h1>
            <div class="header-accent"></div>
        </div>
        <p class="header-subtitle">管理您的自动化任务调度</p>
    </header>

    <div class="stats-grid" id="stats">
        <div class="stat-card">
            <div class="stat-label">总任务数</div>
            <div class="stat-value" id="total-count">-</div>
        </div>
        <div class="stat-card highlight">
            <div class="stat-label">已启用</div>
            <div class="stat-value" id="active-count">-</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">已禁用</div>
            <div class="stat-value" id="disabled-count">-</div>
        </div>
    </div>

    <div class="action-bar">
        <h2>任务列表</h2>
        <button class="btn btn-primary" onclick="openCreateModal()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
            新建任务
        </button>
    </div>

    <div class="task-list" id="task-list">
        <div class="loading">
            <div class="spinner"></div>
        </div>
    </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal">
    <div class="modal">
        <div class="modal-header">
            <h2 id="modal-title">新建任务</h2>
            <button class="btn btn-icon" onclick="closeModal()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
        </div>
        <div class="modal-body">
            <form id="task-form">
                <div class="form-group">
                    <label for="name">任务名称</label>
                    <input type="text" id="name" placeholder="daily_report" required>
                </div>

                <div class="form-group">
                    <label for="content">任务内容 (Markdown)</label>
                    <textarea id="content" placeholder="# 每日报告&#10;&#10;在这里编写任务的具体内容..."></textarea>
                </div>

                <div class="form-group">
                    <label>Cron 表达式 (年 月 日 周 时 分 秒)</label>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="year">年</label>
                            <input type="text" id="year" value="*">
                        </div>
                        <div class="form-group">
                            <label for="month">月</label>
                            <input type="text" id="month" value="*">
                        </div>
                        <div class="form-group">
                            <label for="day">日</label>
                            <input type="text" id="day" value="*">
                        </div>
                        <div class="form-group">
                            <label for="week">周</label>
                            <input type="text" id="week" value="*">
                        </div>
                        <div class="form-group">
                            <label for="day_of_week">星期</label>
                            <input type="text" id="day_of_week" value="*">
                        </div>
                        <div class="form-group">
                            <label for="hour">时</label>
                            <input type="text" id="hour" value="*">
                        </div>
                        <div class="form-group">
                            <label for="minute">分</label>
                            <input type="text" id="minute" value="*">
                        </div>
                        <div class="form-group">
                            <label for="second">秒</label>
                            <input type="text" id="second" value="0">
                        </div>
                    </div>

                    <div class="cron-helper">
                        <div class="cron-preset" onclick="setCron('*','*','*','*','*','*','*','0')">每分钟</div>
                        <div class="cron-preset" onclick="setCron('*','*','*','*','*','*','0','0')">每小时</div>
                        <div class="cron-preset" onclick="setCron('*','*','*','*','*','8','0','0')">每天 8:00</div>
                        <div class="cron-preset" onclick="setCron('*','*','*','*','1-5','8','0','0')">工作日 8:00</div>
                        <div class="cron-preset" onclick="setCron('*','*','*','*','*','18','30','0')">每天 18:30</div>
                        <div class="cron-preset" onclick="setCron('*','*','1','*','*','0','0','0')">每月1日</div>
                    </div>
                </div>
            </form>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="closeModal()">取消</button>
            <button class="btn btn-primary" onclick="createTask()">创建任务</button>
        </div>
    </div>
</div>

<div class="toast-container" id="toast-container"></div>

<script>
    const API_BASE = 'http://localhost:11223';
    const API_PREFIX = '/task';

    let tasks = [];

    document.addEventListener('DOMContentLoaded', () => {
        fetchTasks();
    });

    // GET /task/list
    async function fetchTasks() {
        try {
            const response = await fetch(`${API_BASE}${API_PREFIX}/list`);
            const result = await response.json();

            if (result.success) {
                tasks = result.data || [];
                renderTasks();
                updateStats();
            } else {
                showToast('获取任务列表失败', 'error');
                renderEmptyState();
            }
        } catch (error) {
            console.error('Fetch tasks error:', error);
            showToast('无法连接到服务器', 'error');
            renderEmptyState();
        }
    }

    function renderTasks() {
        const container = document.getElementById('task-list');

        if (tasks.length === 0) {
            renderEmptyState();
            return;
        }

        container.innerHTML = tasks.map((task, index) => `
        <div class="task-card" style="animation-delay: ${index * 0.1}s">
          <div class="task-header">
            <div class="task-info">
              <h3>${escapeHtml(task.name)}</h3>
              <div class="task-meta">
                <span>
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"></circle>
                    <polyline points="12 6 12 12 16 14"></polyline>
                  </svg>
                  下次执行: ${formatDate(task.next_run)}
                </span>
              </div>
            </div>
            <span class="task-status ${task.enabled ? 'enabled' : 'disabled'}">
              ${task.enabled ? '已启用' : '已禁用'}
            </span>
          </div>

          <div class="task-cron">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
              <line x1="16" y1="2" x2="16" y2="6"></line>
              <line x1="8" y1="2" x2="8" y2="6"></line>
              <line x1="3" y1="10" x2="21" y2="10"></line>
            </svg>
            年:${task.year} 月:${task.month} 日:${task.day} 周:${task.week} 星期:${task.day_of_week} 时:${task.hour} 分:${task.minute} 秒:${task.second}
          </div>

          <div class="task-content">${escapeHtml(task.content)}</div>

          <div class="task-actions">
            ${task.enabled
            ? `<button class="btn btn-warning" onclick="disableTask('${task.id}')">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="6" y="4" width="4" height="16"></rect>
                    <rect x="14" y="4" width="4" height="16"></rect>
                  </svg>
                  禁用
                </button>`
            : `<button class="btn btn-success" onclick="enableTask('${task.id}')">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polygon points="5 3 19 12 5 21 5 3"></polygon>
                  </svg>
                  启用
                </button>`
        }
            <button class="btn btn-secondary" onclick="runTask('${task.id}')">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polygon points="5 3 19 12 5 21 5 3"></polygon>
              </svg>
              立即执行
            </button>
            <button class="btn btn-danger" onclick="deleteTask('${task.id}')">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="3 6 5 6 21 6"></polyline>
                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
              </svg>
              删除
            </button>
          </div>
        </div>
      `).join('');

        setTimeout(() => {
            document.querySelectorAll('.task-card').forEach((card, i) => {
                setTimeout(() => card.classList.add('visible'), i * 100);
            });
        }, 50);
    }

    function renderEmptyState() {
        document.getElementById('task-list').innerHTML = `
        <div class="empty-state">
          <div class="empty-state-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
              <line x1="16" y1="2" x2="16" y2="6"></line>
              <line x1="8" y1="2" x2="8" y2="6"></line>
              <line x1="3" y1="10" x2="21" y2="10"></line>
              <line x1="9" y1="14" x2="15" y2="14"></line>
              <line x1="12" y1="11" x2="12" y2="17"></line>
            </svg>
          </div>
          <h3>暂无定时任务</h3>
          <p>创建一个新任务来开始自动化工作</p>
          <button class="btn btn-primary" onclick="openCreateModal()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="12" y1="5" x2="12" y2="19"></line>
              <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
            新建任务
          </button>
        </div>
      `;
        updateStats();
    }

    function updateStats() {
        document.getElementById('total-count').textContent = tasks.length;
        document.getElementById('active-count').textContent = tasks.filter(t => t.enabled).length;
        document.getElementById('disabled-count').textContent = tasks.filter(t => !t.enabled).length;
    }

    function openCreateModal() {
        document.getElementById('modal').classList.add('active');
        document.getElementById('task-form').reset();
        setCron('*', '*', '*', '*', '*', '*', '*', '0');
    }

    function closeModal() {
        document.getElementById('modal').classList.remove('active');
    }

    // setCron(year, month, day, week, day_of_week, hour, minute, second)
    function setCron(year, month, day, week, day_of_week, hour, minute, second) {
        document.getElementById('year').value = year;
        document.getElementById('month').value = month;
        document.getElementById('day').value = day;
        document.getElementById('week').value = week;
        document.getElementById('day_of_week').value = day_of_week;
        document.getElementById('hour').value = hour;
        document.getElementById('minute').value = minute;
        document.getElementById('second').value = second;
    }

    // POST /task
    async function createTask() {
        const task = {
            name: document.getElementById('name').value,
            content: document.getElementById('content').value,
            year: document.getElementById('year').value || '*',
            month: document.getElementById('month').value || '*',
            day: document.getElementById('day').value || '*',
            week: document.getElementById('week').value || '*',
            day_of_week: document.getElementById('day_of_week').value || '*',
            hour: document.getElementById('hour').value || '*',
            minute: document.getElementById('minute').value || '*',
            second: document.getElementById('second').value || '0'
        };

        if (!task.name) {
            showToast('请输入任务名称', 'error');
            return;
        }

        try {
            const response = await fetch(`${API_BASE}${API_PREFIX}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(task)
            });
            const result = await response.json();

            if (result.success) {
                showToast('任务创建成功', 'success');
                closeModal();
                fetchTasks();
            } else {
                showToast(result.message || '创建失败', 'error');
            }
        } catch (error) {
            console.error('Create task error:', error);
            showToast('网络错误', 'error');
        }
    }

    // POST /task/{id}/enable
    async function enableTask(id) {
        try {
            const response = await fetch(`${API_BASE}${API_PREFIX}/${id}/enable`, {method: 'POST'});
            const result = await response.json();

            if (result.success) {
                showToast('任务启用成功', 'success');
                fetchTasks();
            } else {
                showToast(result.message || '操作失败', 'error');
            }
        } catch (error) {
            console.error('Enable task error:', error);
            showToast('网络错误', 'error');
        }
    }

    // POST /task/{id}/disable
    async function disableTask(id) {
        try {
            const response = await fetch(`${API_BASE}${API_PREFIX}/${id}/disable`, {method: 'POST'});
            const result = await response.json();

            if (result.success) {
                showToast('任务禁用成功', 'success');
                fetchTasks();
            } else {
                showToast(result.message || '操作失败', 'error');
            }
        } catch (error) {
            console.error('Disable task error:', error);
            showToast('网络错误', 'error');
        }
    }

    // POST /task/{id}/run
    async function runTask(id) {
        try {
            const response = await fetch(`${API_BASE}${API_PREFIX}/${id}/run`, {method: 'POST'});
            const result = await response.json();

            if (result.success) {
                showToast('任务已立即执行', 'success');
            } else {
                showToast(result.message || '执行失败', 'error');
            }
        } catch (error) {
            console.error('Run task error:', error);
            showToast('网络错误', 'error');
        }
    }

    // DELETE /task/{id}
    async function deleteTask(id) {
        if (!confirm('确定要删除这个任务吗？')) return;

        try {
            const response = await fetch(`${API_BASE}${API_PREFIX}/${id}`, {method: 'DELETE'});
            const result = await response.json();

            if (result.success) {
                showToast('任务已删除', 'success');
                fetchTasks();
            } else {
                showToast(result.message || '删除失败', 'error');
            }
        } catch (error) {
            console.error('Delete task error:', error);
            showToast('网络错误', 'error');
        }
    }

    function showToast(message, type = 'info') {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.innerHTML = `
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          ${type === 'success'
            ? '<polyline points="20 6 9 17 4 12"></polyline>'
            : type === 'error'
                ? '<circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line>'
                : '<circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line>'
        }
        </svg>
        ${message}
      `;
        container.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text || '';
        return div.innerHTML;
    }

    function formatDate(dateStr) {
        if (!dateStr) return 'N/A';
        const date = new Date(dateStr);
        return date.toLocaleString('zh-CN', {
            month: '2-digit',
            day: '2-digit',
            hour: '2-digit',
            minute: '2-digit'
        });
    }

    document.getElementById('modal').addEventListener('click', (e) => {
        if (e.target.id === 'modal') closeModal();
    });

    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') closeModal();
    });
</script>
</body>
</html>
